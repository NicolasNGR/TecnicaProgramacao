<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado do Clima</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h2 {
            margin-bottom: 20px;
        }

        p {
            margin: 10px 0;
            font-size: 16px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background: #007BFF;
            padding: 10px 15px;
            border-radius: 6px;
        }

        a:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Resultado</h2>

        <p><strong>Temperatura:</strong> <span th:text="${clima.atual.temperatura}"></span> °C</p>
        <p><strong>Vento:</strong> <span th:text="${clima.atual.vento}"></span> km/h</p>
        <p><strong>Condição:</strong> <span th:text="${clima.atual.descricao}"></span></p>

        <a href="/">Voltar</a>
    </div>
</body>
</html>
