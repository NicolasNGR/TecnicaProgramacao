<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Cadastro de Produtos</h1>

    <div class="erro" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/salvar}" th:object="${produto}" method="post">
        <label for="nome">Nome</label>
        <input type="text" id="nome" th:field="*{nome}" required>

        <label for="preco">Preço</label>
        <input type="number" id="preco" step="0.01" th:field="*{preco}" required>

        <label for="categoria">Categoria</label>
        <select id="categoria" th:field="*{categoria}" required>
            <option value="">Selecione</option>
            <option value="Eletrônico">Eletrônico</option>
            <option value="Vestuário">Vestuário</option>
            <option value="Alimento">Alimento</option>
            <option value="Outros">Outros</option>
        </select>

        <label for="estoque">Estoque</label>
        <input type="number" id="estoque" th:field="*{estoque}" required>

        <button type="submit">Cadastrar</button>
    </form>

    <a class="link" th:href="@{/lista}">Ver lista de produtos</a>
</div>
</body>
</html>
